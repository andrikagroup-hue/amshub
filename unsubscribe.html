<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unsubscribe - Reliable Fire & Security</title>
<style>
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
    color: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .box {
    background: #fff;
    max-width: 420px;
    width: 90%;
    padding: 32px 28px;
    border-radius: 10px;
    box-shadow: 0 10px 40px rgba(0,0,0,.15);
    text-align: center;
  }
  .box h1 { font-size: 22px; margin: 0 0 14px; }
  .box p { font-size: 14px; line-height: 1.6; color: #444; }
  .icon { font-size: 40px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="box" id="box">
  <div class="icon">⏳</div>
  <h1>Memproses...</h1>
  <p>Mohon tunggu sebentar.</p>
</div>

<!-- SUPABASE JS CLIENT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ============================================
  // GANTI DUA BARIS DI BAWAH INI DENGAN DATA SUPABASE KAMU
  // (SAMA seperti di index.html)
  // ============================================
  const supabaseUrl = "https://xcmpsmydlgtvegqtokez.supabase.co";
  const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhjbXBzbXlkbGd0dmVncXRva2V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NTI1NjAsImV4cCI6MjA5NzQyODU2MH0.opac4K11jP9O85PqsZV5BWD08oaaZ2OehQrvp2R_wsY";
  // ============================================

  const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
  const box = document.getElementById("box");

  function render(icon, title, text) {
    box.innerHTML =
      '<div class="icon">' + icon + '</div>' +
      '<h1>' + title + '</h1>' +
      '<p>' + text + '</p>';
  }

  async function doUnsubscribe() {
    const params = new URLSearchParams(window.location.search);
    const email = params.get("email");

    if (!email) {
      render("⚠️", "Link tidak lengkap", "Alamat email tidak ditemukan di link ini.");
      return;
    }

    // Memanggil fungsi khusus di Supabase (dibuat lewat SQL Editor)
    const { error } = await supabase.rpc("unsubscribe_user", { p_email: email });

    if (error) {
      console.error(error);
      render("❌", "Gagal unsubscribe", "Terjadi kesalahan. Coba lagi nanti atau hubungi kami langsung.");
      return;
    }

    render("✅", "Berhasil unsubscribe", "Kamu (" + email + ") tidak akan menerima email marketing kami lagi. Terima kasih!");
  }

  doUnsubscribe();
</script>

</body>
</html>
